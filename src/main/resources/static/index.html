<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日热榜早报</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <section>
        <div class="kicker">Morning Brief</div>
        <h1 id="pageTitle">每日热榜早报</h1>
        <p id="pageSubtitle" class="subtitle">汇聚今日值得关注的信息。少一点噪音，多一点清晰，把分散的热榜整理成一份适合早晨阅读的简报。</p>
      </section>

      <aside class="hero-side" aria-label="刷新和日期">
        <div class="date-card">
          <div class="date-label">今天</div>
          <div id="currentDate" class="date-main">--</div>
        </div>
        <button id="refreshButton" class="refresh" type="button">
          <span class="refresh-icon" aria-hidden="true"></span>
          <span id="refreshText">刷新当前榜单</span>
        </button>
      </aside>
    </header>

    <section id="homeView">
      <section class="brief-strip" aria-label="平台概览">
        <div class="brief-item">
          <div class="brief-value">5</div>
          <div class="brief-label">平台入口</div>
        </div>
        <div class="brief-item">
          <div class="brief-value">8</div>
          <div class="brief-label">榜单视图</div>
        </div>
        <div class="brief-item">
          <div id="homeTime" class="brief-value">--:--</div>
          <div class="brief-label">当前时间</div>
        </div>
      </section>

      <section class="platform-grid" aria-label="平台入口">
        <button class="platform-card source-card" type="button" data-platform="baidu">
          <div class="source-head">
            <div class="source-title">
              <div class="source-mark">百</div>
              <div>
                <div class="source-name">百度</div>
                <div class="source-desc">百度热搜榜</div>
              </div>
            </div>
            <div class="source-time">进入</div>
          </div>
          <p class="platform-desc">查看大众舆论与社会热点，适合作为每日信息入口。</p>
        </button>

        <button class="platform-card source-card bilibili" type="button" data-platform="bilibili">
          <div class="source-head">
            <div class="source-title">
              <div class="source-mark">B</div>
              <div>
                <div class="source-name">Bilibili</div>
                <div class="source-desc">总榜 / 科技 / 游戏 / 美食</div>
              </div>
            </div>
            <div class="source-time">进入</div>
          </div>
          <p class="platform-desc">浏览 B 站不同分区的真实排行榜，捕捉内容社区趋势。</p>
        </button>

        <button class="platform-card source-card github" type="button" data-platform="github">
          <div class="source-head">
            <div class="source-title">
              <div class="source-mark">Git</div>
              <div>
                <div class="source-name">GitHub</div>
                <div class="source-desc">项目趋势 / Skills 预留</div>
              </div>
            </div>
            <div class="source-time">进入</div>
          </div>
          <p class="platform-desc">查看开源项目趋势，并预留 Skills 榜单入口。</p>
        </button>

        <button class="platform-card source-card" type="button" data-platform="ai">
          <div class="source-head">
            <div class="source-title">
              <div class="source-mark">AI</div>
              <div>
                <div class="source-name">AI 行业</div>
                <div class="source-desc">预留入口</div>
              </div>
            </div>
            <div class="source-time">稍后</div>
          </div>
          <p class="platform-desc">后续可接入 AI 行业资讯、模型发布和产品趋势。</p>
        </button>

        <button class="platform-card source-card" type="button" data-platform="game-community">
          <div class="source-head">
            <div class="source-title">
              <div class="source-mark">游</div>
              <div>
                <div class="source-name">游戏社区</div>
                <div class="source-desc">Steam 热销 / 热玩</div>
              </div>
            </div>
            <div class="source-time">进入</div>
          </div>
          <p class="platform-desc">收录 Steam 热销榜、Steam 热玩榜等游戏趋势。</p>
        </button>
      </section>
    </section>

    <section id="detailView" class="detail-view hidden" aria-label="平台详情">
      <div class="detail-top">
        <button id="backButton" class="back-button" type="button">← 返回首页</button>
        <div>
          <h2 id="platformTitle" class="detail-title">平台标题</h2>
          <p id="platformIntro" class="detail-intro">平台简介</p>
        </div>
      </div>

      <div class="detail-layout">
        <aside class="board-nav" aria-label="榜单导航">
          <div id="boardNav" class="board-nav-inner"></div>
        </aside>

        <section class="board-panel source-card">
          <div class="source-head">
            <div class="source-title">
              <div id="boardMark" class="source-mark">榜</div>
              <div>
                <div id="boardTitle" class="source-name">榜单</div>
                <div id="boardDesc" class="source-desc">请选择榜单</div>
              </div>
            </div>
            <div id="boardTime" class="source-time">--</div>
          </div>

          <div id="boardContent"></div>
        </section>
      </div>
    </section>

    <footer class="footer">Updated from public hot sources.</footer>
  </main>

  <script src="/app.js"></script>
</body>
</html>
